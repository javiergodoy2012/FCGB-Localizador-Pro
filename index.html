<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FCGB Localizador Pro · C15</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#08111f;--panel:#101c31;--blue:#0c5aa6;--yellow:#ffd447;--text:#eaf1fb;--muted:#92a7c4;--danger:#ff8c72}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
header{padding:18px 20px;background:linear-gradient(90deg,#0c315d,#0b1e38);border-bottom:3px solid var(--yellow)}
header h1{margin:0;font-size:22px}header p{margin:5px 0 0;color:var(--muted)}
main{display:grid;grid-template-columns:390px 1fr;min-height:calc(100vh - 86px)}
.panel{padding:18px;background:var(--panel);border-right:1px solid #24344e}
label{display:block;margin:12px 0 6px;font-weight:bold}
input{width:100%;padding:13px;border-radius:7px;border:1px solid #3b4c67;background:#07111f;color:white;font-size:20px}
button{width:100%;padding:13px;margin-top:12px;border:0;border-radius:7px;background:var(--yellow);color:#101820;font-weight:bold;cursor:pointer}
.card{margin-top:16px;padding:15px;border-radius:8px;background:#081423;border:1px solid #23354e}
.km{font-size:30px;font-weight:bold;color:var(--yellow)}
.coords{font-family:monospace;font-size:16px;margin:10px 0}
.links a{display:inline-block;margin-right:8px;color:#8bc5ff}
.warning{padding:10px;border-radius:7px;background:#44271e;color:#ffd1c6;font-size:13px;margin-bottom:14px}
.status{font-size:13px;color:var(--muted);margin-top:8px}
#map{height:100%;min-height:650px}
@media(max-width:800px){main{grid-template-columns:1fr}.panel{border-right:0}#map{min-height:480px}}
</style>
</head>
<body>
<header>
<h1>FCGB Localizador Pro · Ramal C15</h1>
<p>Perico km 1120,846 – Pocitos km 1455,362 · UP Salta · resolución 1 metro</p>
</header>
<main>
<section class="panel">
<div class="warning"><b>Base candidata.</b> La geometría está calibrada con PK TAC sobre Ferromapas y todavía no debe presentarse como validación OSM definitiva.</div>
<label for="km">Progresiva kilométrica</label>
<input id="km" inputmode="decimal" placeholder="Ej.: 1311,735">
<button id="buscar">BUSCAR PK</button>
<div class="status" id="status">Esperando búsqueda.</div>
<div class="card" id="resultado" hidden>
<div class="km" id="rkm"></div>
<div class="coords" id="coords"></div>
<div id="detalle"></div>
<div class="links">
<a id="gmap" target="_blank" rel="noopener">Google Maps</a>
<a id="osm" target="_blank" rel="noopener">OpenStreetMap</a>
</div>
</div>
</section>
<div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([-23.8,-64.4],8);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
L.tileLayer('https://tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{maxZoom:19,opacity:.65,attribution:'OpenRailwayMap'}).addTo(map);

let catalog=null, marker=null, cache=new Map();

async function loadCatalog(){
  const r=await fetch('data/catalogo_c15.json');
  catalog=await r.json();
}
function parseKm(v){return Number(String(v).replace(',','.').trim())}
function findBlock(km){
  return catalog.bloques.find(b=>b.desde<=km && km<=b.hasta);
}
async function loadBlock(meta){
  if(cache.has(meta.archivo)) return cache.get(meta.archivo);
  const r=await fetch('data/'+meta.archivo);
  const data=await r.json();
  cache.set(meta.archivo,data);
  return data;
}
function binaryPoint(arr,km){
  let lo=0,hi=arr.length-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1, mk=arr[mid][0];
    if(Math.abs(mk-km)<0.0005) return arr[mid];
    if(mk<km) lo=mid+1; else hi=mid-1;
  }
  return null;
}
async function buscar(){
  const status=document.getElementById('status');
  const km=parseKm(document.getElementById('km').value);
  if(!Number.isFinite(km) || km<catalog.km_inicio || km>catalog.km_fin){
    status.textContent='Ingresá un PK entre 1120,846 y 1455,362.';
    return;
  }
  const normalized=Math.round(km*1000)/1000;
  const meta=findBlock(normalized);
  if(!meta){status.textContent='No se encontró el bloque correspondiente.';return}
  status.textContent='Cargando bloque local...';
  const block=await loadBlock(meta);
  const p=binaryPoint(block.puntos,normalized);
  if(!p){status.textContent='No existe un punto exacto para ese metro.';return}
  const [pk,lat,lon]=p;
  document.getElementById('resultado').hidden=false;
  document.getElementById('rkm').textContent='KM '+pk.toFixed(3).replace('.',',');
  document.getElementById('coords').textContent=lat.toFixed(7)+', '+lon.toFixed(7);
  document.getElementById('detalle').innerHTML='<p>Ramal C15 · UP Salta<br>Resolución: 1 metro<br>Estado: candidato pendiente de contraste OSM</p>';
  document.getElementById('gmap').href='https://www.google.com/maps?q='+lat+','+lon;
  document.getElementById('osm').href='https://www.openstreetmap.org/?mlat='+lat+'&mlon='+lon+'#map=18/'+lat+'/'+lon;
  if(marker) marker.remove();
  marker=L.marker([lat,lon]).addTo(map).bindPopup('C15 · KM '+pk.toFixed(3)).openPopup();
  map.setView([lat,lon],17);
  status.textContent='Punto cargado desde la base local.';
}
document.getElementById('buscar').addEventListener('click',buscar);
document.getElementById('km').addEventListener('keydown',e=>{if(e.key==='Enter')buscar()});
loadCatalog().then(()=>document.getElementById('status').textContent='Base C15 lista.');
</script>
</body>
</html>
